<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHP Slides</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --card-hover: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(ellipse at top, #1e293b 0%, #0f172a 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 520px;
        }

        header {
            text-align: center;
            margin-bottom: 48px;
        }

        .badge {
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
            background: var(--accent-glow);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 6px 14px;
            border-radius: 999px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1.5;
        }

        .lectures {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .lecture {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 20px;
            background: var(--card);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 14px;
            text-decoration: none;
            color: inherit;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .lecture::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(56, 189, 248, 0.05), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .lecture:hover {
            background: var(--card-hover);
            border-color: rgba(56, 189, 248, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px -12px rgba(0, 0, 0, 0.5);
        }

        .lecture:hover::before {
            opacity: 1;
        }

        .lecture:active {
            transform: translateY(0);
        }

        .lecture-number {
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: var(--accent);
            background: var(--accent-glow);
            border-radius: 12px;
        }

        .lecture-info {
            flex: 1;
            min-width: 0;
        }

        .lecture-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .lecture-meta {
            font-size: 13px;
            color: var(--text-muted);
        }

        .lecture-arrow {
            flex-shrink: 0;
            color: var(--text-muted);
            transition: transform 0.2s, color 0.2s;
        }

        .lecture:hover .lecture-arrow {
            color: var(--accent);
            transform: translateX(3px);
        }

        .add-hint {
            margin-top: 32px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            opacity: 0.7;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 28px;
            }
            .lecture {
                padding: 16px;
            }
            .lecture-number {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="badge">ppt</div>
            <h1>动态网页设计</h1>
            <p class="subtitle">PHP 课程幻灯片</p>
        </header>

        <ul class="lectures">
            <li>
                <a href="php/slidev/lecture06/" class="lecture">
                    <span class="lecture-number">06</span>
                    <div class="lecture-info">
                        <div class="lecture-title">第06讲</div>
                        <div class="lecture-meta">自定义函数、字符串函数、图像函数</div>
                    </div>
                    <svg class="lecture-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </a>
            </li>
            <li>
                <a href="php/slidev/lecture08/" class="lecture">
                    <span class="lecture-number">08</span>
                    <div class="lecture-info">
                        <div class="lecture-title">第08讲</div>
                        <div class="lecture-meta">表单处理与正则验证</div>
                    </div>
                    <svg class="lecture-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </a>
            </li>
            <li>
                <a href="php/slidev/lecture09/" class="lecture">
                    <span class="lecture-number">09</span>
                    <div class="lecture-info">
                        <div class="lecture-title">第09讲</div>
                        <div class="lecture-meta">文件操作与上传</div>
                    </div>
                    <svg class="lecture-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </a>
            </li>
            <li>
                <a href="php/slidev/lecture10/" class="lecture">
                    <span class="lecture-number">10</span>
                    <div class="lecture-info">
                        <div class="lecture-title">第10讲</div>
                        <div class="lecture-meta">Cookies和会话管理</div>
                    </div>
                    <svg class="lecture-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </a>
            </li>
        </ul>

        <p class="add-hint">Add a new lecture by copying a list item and updating the number.</p>
    </div>
</body>
</html>
